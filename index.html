<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no"/>
<title>🐚 Omar & Zeina's Wedding | La Maison Bleue 2026</title>
<meta name="description" content="Join us for the wedding of Omar & Zeina at La Maison Bleue. 30/8/2026."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  font-family:'DM Sans',sans-serif;
  color:#4a2b1b;
  overflow-x:hidden;
  background: #e0f7fa url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

:root{
  --ocean:#26c6da;--ocean-deep:#00838f;--ocean-mid:#4dd0e1;
  --coral:#d4a373;--coral-light:#81c784;--coral-pale:#e0f7fa;
  --sand:#d4a373;--sand-light:#ffecb3;--sand-pale:#fff8e1;
  --teal:#0097a7;--teal-light:#4dd0e1;
  --pink:#f8bbd0;--pink-light:#fce4ec;
  --cream:#004d40;--text-sand:#5d4037;
  --bg:rgba(240, 253, 244, 0.50);         
  --bg-mid:rgba(224, 242, 241, 0.50);     
  --bg-card:rgba(255,255,255,0.60); 
  --card-border:rgba(77,208,225,0.35);
}

.grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(2deg)}}
@keyframes pulseBeat{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.1);opacity:1}}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes starTwinkle{0%,100%{opacity:.1}50%{opacity:.95}}
@keyframes waveFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes loadIn{0%{opacity:0;transform:scale(.88)}25%{opacity:1;transform:scale(1)}75%{opacity:1}100%{opacity:0;transform:scale(1.06)}}
@keyframes dotPop{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.6);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes rsvpPop{0%{transform:scale(.78);opacity:0}60%{transform:scale(1.07)}100%{transform:scale(1);opacity:1}}
@keyframes endingDrift{0%{transform:translateY(20px);opacity:0}15%{opacity:.65}85%{opacity:.65}100%{transform:translateY(-130px);opacity:0}}
@keyframes waveAnim{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pearlGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(255,255,255,0.6))}50%{filter:drop-shadow(0 0 24px rgba(255,255,255,1))}}

#loading-screen{position:fixed;inset:0;z-index:10000;background:linear-gradient(135deg,#e0f7fa,#80deea,#fff8e1);display:flex;align-items:center;justify-content:center;transition:opacity .85s ease-out,visibility .85s;}
.loading-inner{text-align:center;animation:loadIn 2.6s ease forwards;}
.loading-name{font-family:'Dancing Script',cursive;font-size:72px;font-weight:700;line-height:1;background:linear-gradient(135deg,#0097a7,#26c6da,#ffecb3);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:waveFlow 2s linear infinite;}
.loading-sub{font-family:'Playfair Display',serif;font-size:18px;color:var(--ocean-deep);margin-top:10px;letter-spacing:4px;font-style:italic;}
.loading-dots{margin-top:26px;display:flex;justify-content:center;gap:10px;}
.loading-dots span{width:9px;height:9px;border-radius:50%;background:var(--sand);animation:dotPop 1.2s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;background:var(--teal);}
.loading-dots span:nth-child(3){animation-delay:.4s;background:var(--ocean);}

#dancer-screen{min-height:100vh;background:radial-gradient(ellipse at 50% 38%,rgba(255,255,255,0.7) 0%,rgba(224,247,250,0.8) 55%,rgba(128,222,234,0.8) 85%,rgba(255,248,225,0.9) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;padding:40px 20px;user-select:none;-webkit-user-select:none;text-align:center;}
#dancer-stars{position:absolute;inset:0;pointer-events:none;}
.wave-stripe{position:absolute;left:0;right:0;height:8px;overflow:hidden;}
.wave-stripe.top{top:0;} .wave-stripe.bottom{bottom:0;}
.wave-stripe-inner{height:100%;width:200%;background:repeating-linear-gradient(90deg,var(--teal-light) 0,var(--teal-light) 18px,rgba(255,255,255,0.5) 18px,rgba(255,255,255,0.5) 28px,var(--sand) 28px,var(--sand) 38px,rgba(255,255,255,0.5) 38px,rgba(255,255,255,0.5) 48px);animation:waveAnim 4s linear infinite;opacity:.65;}

.shell-wrap{position:relative;z-index:2;animation:float 4s ease-in-out infinite;filter:drop-shadow(0 8px 24px rgba(0,151,167,.35));}
.shell-lid, .shell-base{transform-box:fill-box;}
.shell-lid{transform-origin:bottom center;transition:transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);}
.shell-base{transform-origin:top center;transition:transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);}

#pearl{opacity:0;transform:scale(0.5);transform-box:fill-box;transform-origin:center;transition:all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s;}

#glow-transition{position:absolute;top:50%;left:50%;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0) 70%);transform:translate(-50%,-50%) scale(0);opacity:0;pointer-events:none;z-index:10;transition:all 1.5s cubic-bezier(0.215,.61,.355,1);}

.is-opening .shell-wrap{animation-play-state:paused;}
.is-opening .shell-lid{transform: translateY(-40px) scaleY(0.5) rotate(-8deg);}
.is-opening .shell-base{transform: translateY(15px) scaleY(0.85) rotate(4deg);}
.is-opening #pearl{opacity:1;transform:scale(1);animation:pearlGlow 2s ease-in-out infinite;}
.is-opening .touch-label{opacity:0;transition:opacity 0.3s;}
.is-glowing #glow-transition{transform:translate(-50%,-50%) scale(50);opacity:1;}
.is-fading #dancer-screen{opacity:0;transition:opacity 0.8s ease-out;}

.touch-label{position:relative;z-index:2;margin-top:10px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--ocean-deep);animation:pulseBeat 2.1s ease-in-out infinite;transition:opacity 0.3s;}
.touch-main{font-family:'Dancing Script',cursive;font-size:clamp(44px,9vw,68px);color:var(--ocean-deep);text-align:center;position:relative;z-index:2;text-shadow:0 0 24px rgba(0,151,167,.25);line-height:1;}
.touch-sub{font-size:12px;letter-spacing:4px;color:var(--teal);text-transform:uppercase;animation:shimmer 3s ease-in-out infinite;position:relative;z-index:2;margin-top:10px;}

.sand-div{height:2px;background:linear-gradient(90deg,transparent,var(--sand),var(--teal-light),var(--sand),transparent);}
.wave-div{height:7px;background:repeating-linear-gradient(90deg,var(--teal-light) 0,var(--teal-light) 18px,rgba(255,255,255,0.8) 18px,rgba(255,255,255,0.8) 28px,var(--sand) 28px,var(--sand) 38px,rgba(255,255,255,0.8) 38px,rgba(255,255,255,0.8) 48px);opacity:.55;}

.reveal-section{opacity:0;transform:translateY(42px);transition:opacity 1.2s cubic-bezier(.215,.61,.355,1),transform 1.2s cubic-bezier(.215,.61,.355,1);}
.reveal-section.revealed{opacity:1;transform:translateY(0);}
.reveal-child{opacity:0;transform:translateY(22px);transition:opacity .9s cubic-bezier(.215,.61,.355,1),transform .9s cubic-bezier(.215,.61,.355,1);}
.reveal-section.revealed .reveal-child{opacity:1;transform:translateY(0);}
.rd1{transition-delay:.1s}.rd2{transition-delay:.25s}.rd3{transition-delay:.4s}.rd4{transition-delay:.55s}

#music-btn{position:fixed;top:20px;right:20px;z-index:1000;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.85);border:1.5px solid var(--teal-light);color:var(--ocean-deep);font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);transition:transform .2s;box-shadow:0 4px 18px rgba(0,151,167,.2);}
#music-btn:hover{transform:scale(1.12);}

.s-label{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--teal);display:block;margin-bottom:10px;font-weight:700;}
.s-title{font-family:'Playfair Display',serif;color:var(--cream);font-size:clamp(22px,4vw,38px);margin-bottom:14px;font-weight:700;}
.s-sub{font-style:italic;font-size:15px;color:var(--ocean-deep);max-width:460px;margin:0 auto;line-height:1.75;}

.hero-section{background:rgba(255, 248, 225, 0.50);backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);padding:80px 24px 64px;text-align:center;position:relative;overflow:hidden;}
.hero-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,151,167,.1) 0%,transparent 60%);pointer-events:none;}

.countdown-row{display:flex;justify-content:center;gap:clamp(10px,2.5vw,24px);flex-wrap:wrap;}
.cbox{background:var(--bg-card);border-radius:16px;padding:20px 18px;min-width:82px;text-align:center;box-shadow:0 4px 24px rgba(0,151,167,.1);border:1.5px solid rgba(77,208,225,.35);transition:transform .2s,box-shadow .2s;aspect-ratio:1/1.1;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.cbox:hover{transform:scale(1.06);box-shadow:0 8px 32px rgba(0,151,167,.25);}
.cnum{font-size:clamp(30px,6vw,50px);font-weight:300;color:var(--teal);line-height:1;font-family:'Playfair Display',serif;width:100%;}
.clbl{font-size:11px;letter-spacing:3px;color:var(--sand-light);margin-top:6px;text-transform:uppercase;font-weight:500;}

#venue-bg{position:absolute;inset:-60px;background-size:cover;background-position:center;will-change:transform;}
#venue-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,131,143,.5),rgba(0,77,64,.85));}
#venue-content{position:relative;z-index:2;text-align:center;padding:90px 24px;}

.sched-item{display:flex;align-items:center;margin-bottom:28px;text-align:left;position:relative;}
.sched-item:not(:last-child)::after{content:'';position:absolute;left:20px;top:42px;width:2px;height:28px;background:linear-gradient(to bottom,var(--teal-light),transparent);opacity:.45;}
.sched-icon{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,0.9),var(--bg-mid));color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:20px;border:1.5px solid rgba(77,208,225,.35);flex-shrink:0;}
.sched-det h4{font-family:'Playfair Display',serif;color:var(--cream);font-size:16px;font-weight:700;}
.sched-det p{font-size:14px;color:var(--ocean-deep);font-style:italic;margin-top:3px;}

#dress-section{padding:72px 24px;text-align:center;background:rgba(224, 242, 241, 0.50);backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);position:relative;overflow:hidden;}
.dress-cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;max-width:700px;margin:40px auto 0;}
.dress-card{flex:1;min-width:180px;max-width:220px;border-radius:20px;padding:32px 20px;text-align:center;transition:transform .3s,box-shadow .3s;cursor:default;box-shadow:0 8px 24px rgba(0,77,64,.15);border:1.5px solid rgba(255,255,255,0.25);}
.dress-card:hover{transform:translateY(-7px);}
.dress-icon{font-size:46px;margin-bottom:14px;display:block;}
.dress-name{font-family:'Playfair Display',serif;font-size:18px;color:#fff;margin-bottom:8px;}
.dress-desc{font-size:12px;color:rgba(255,255,255,.9);letter-spacing:1px;line-height:1.5;}

#rules-section{background:var(--bg);backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);padding:72px 24px;text-align:center;}
.rule-item{display:flex;align-items:center;gap:16px;max-width:480px;margin:0 auto 18px;text-align:left;}
.rule-dot{width:8px;height:8px;border-radius:50%;background:var(--teal-light);flex-shrink:0;}
.rule-text{font-size:15px;color:var(--cream);line-height:1.6;font-weight:500;}

#spicy-section{background:var(--bg-mid);backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);padding:72px 24px;text-align:center;overflow:hidden;}
.spicy-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:920px;margin:40px auto 0;}
.spicy-card{background:var(--bg-card);border-radius:20px;padding:32px 24px;text-align:left;border:1.5px solid var(--card-border);box-shadow:0 8px 32px rgba(0,151,167,.08);transition:transform .3s,box-shadow .3s,border-color .3s;position:relative;overflow:hidden;backdrop-filter:blur(12px);}
.spicy-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,151,167,.06),rgba(255,236,179,.06));opacity:0;transition:opacity .3s;}
.spicy-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,151,167,.18);border-color:var(--teal);}
.spicy-card:hover::before{opacity:1;}
.spicy-emoji{font-size:38px;margin-bottom:14px;display:block;position:relative;z-index:1;}
.spicy-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--cream);margin-bottom:8px;position:relative;z-index:1;font-weight:700;}
.spicy-desc{font-size:14px;color:var(--ocean-deep);font-style:italic;line-height:1.7;position:relative;z-index:1;}

#wishes-section{background:rgba(224, 247, 250, 0.50);backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);padding:72px 24px;text-align:center;overflow:hidden;}
.wishes-form{max-width:480px;margin:32px auto 0;}
.wishes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;max-width:800px;margin:40px auto 0;text-align:left;}
.wish-card{background:var(--bg-card);border-radius:16px;padding:24px;border:1.5px solid var(--card-border);box-shadow:0 8px 24px rgba(0,151,167,.1);position:relative;overflow:hidden;}
.wish-card::before{content:'🐚';position:absolute;top:-10px;right:-10px;font-size:60px;opacity:0.15;transform:rotate(20deg);}
.wish-name{font-family:'Dancing Script',cursive;font
